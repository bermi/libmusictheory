<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="Harmonious SPA demo powered by libmusictheory WASM.">
    <title>Harmonious SPA - Loading</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231c3840'/%3E%3Ccircle cx='24' cy='42' r='11' fill='%23f7f4ed'/%3E%3Crect x='33' y='13' width='7' height='29' rx='3.5' fill='%23f7f4ed'/%3E%3Crect x='38' y='13' width='14' height='6' rx='3' fill='%23f7f4ed'/%3E%3C/svg%3E">
    <link id="spa-shell-canonical" rel="canonical" href="./index.html">
    <link rel="stylesheet" type="text/css" href="./css/fonts.css">
    <link rel="stylesheet" type="text/css" href="./css/metrics.css">
    <link rel="stylesheet" type="text/css" href="./css/styles.css">
    <link rel="stylesheet" type="text/css" href="./css/frets.css">
    <link rel="stylesheet" type="text/css" href="./css/kb.css">
    <link rel="stylesheet" type="text/css" href="./css/fctable.css">
    <style>
      body.isapp {
        background: #f7f4ed;
      }
      #spa-shell-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        box-sizing: border-box;
        font-family: "Fira Sans Condensed", sans-serif;
        font-size: 1.2rem;
        color: #1c3840;
      }
      #spa-shell-loading.error {
        color: #b03620;
      }
      .spa-search-group {
        padding: 0.35rem 0.5rem 1rem;
      }
      .spa-search-count,
      .spa-search-empty,
      .spa-search-meta,
      .spa-search-excerpt {
        font-family: "Fira Sans Condensed", sans-serif;
        font-weight: 300;
      }
      .spa-search-count,
      .spa-search-empty,
      .spa-search-meta {
        color: #42555c;
        margin: 0.3rem 0 0.5rem;
      }
      .spa-search-excerpt {
        color: #42555c;
        font-size: 0.9rem;
        line-height: 1.3;
        margin: 0.2rem 0 0.85rem;
      }
      .spa-search-group .entry {
        margin-bottom: 0.4rem;
      }
    </style>
    <script>
      window.HarmoniousConfig = {
        BaseUrl: window.location.origin,
        IsDevelop: false,
        IsExperimental: false,
        ServerStringReplacer: function(s) {
          return String(s)
            .replace(/https?:\/\/harmoniousapp\.net\//g, '/')
            .replace(/http:\/\/cerebrum\.local:8181\//g, '/');
        },
      };
    </script>
    <script src="./js-client/jquery-1.12.3.min.js"></script>
    <script src="./js-client/iscroll.js"></script>
    <script src="./js-client/missing-core-code.js"></script>
    <script src="./js-client/pitch-class-sets.js"></script>
    <script src="./js-client/is-exp.js"></script>
    <script src="./js-client/client-side.js"></script>
    <script src="./js-client/kb.js"></script>
    <script src="./js-client/frets.js"></script>
    <script src="./js-client/slider.js"></script>
    <script src="./js-client/sorttable.js"></script>
    <script type="module" src="./harmonious-spa.js"></script>
  </head>
  <body class="isapp">
    <main id="spa-shell-loading">Loading Harmonious SPA…</main>
  </body>
</html>
